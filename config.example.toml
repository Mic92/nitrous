relays = [
  "wss://relay.damus.io",
  "wss://relay.nostr.band",
  "wss://nos.lol",
]

# Default relay for /group create (optional, can be overridden per command).
# group_relay = "wss://groups.0xchat.com"

# Blossom servers for file uploads (uploaded to all servers).
# blossom_servers = ["https://blossom.nostr.build"]

# Path to a file containing your private key (nsec or hex).
# Falls back to NOSTR_PRIVATE_KEY env var if not set.
private_key_file = "~/.config/nitrous/nsec"

max_messages = 500

# Theme: "auto" (detect terminal background), "dark", or "light".
# Default is auto-detection. Override if detection gives wrong results
# (e.g. inside tmux or over SSH).
# theme = "auto"

# Notifications — desktop notifications and terminal bell.
# Both enabled by default. Desktop uses notify-send (Linux) or
# osascript (macOS). Bell emits \a (useful in tmux).
# Notifications only fire when the terminal is unfocused.
# DMs always notify; channels/groups only notify on mention.
# notifications_desktop = true
# notifications_bell = true

# Message logging — plain-text chat logs, one file per room.
# Enabled by default. Set to false to disable.
# logging = true
# log_dir = "~/.config/nitrous/logs"

# Your Nostr profile (NIP-01 kind 0), published to relays on startup.
[profile]
# name = ""
# display_name = ""
# about = ""
# picture = "https://example.com/avatar.png"
